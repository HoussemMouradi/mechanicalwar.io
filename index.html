<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>mechanical war.io</title>
<meta name="description" content="Mechanical War stable build restored after black-screen map patch">
<style>
html,body{margin:0;height:100%;background:#07101d;color:#eaf2ff;font-family:system-ui,Segoe UI,Arial;display:grid;place-items:center}.card{max-width:760px;margin:20px;padding:22px;border:1px solid #ffffff26;border-radius:22px;background:#0f172af5;box-shadow:0 25px 80px #000a}.title{font-size:clamp(32px,8vw,56px);margin:0 0 8px;font-weight:950;text-transform:uppercase;background:linear-gradient(90deg,#fff,#fbbf24,#38bdf8);-webkit-background-clip:text;color:transparent}.small{color:#94a3b8}.err{color:#fca5a5;white-space:pre-wrap}button{border:1px solid #ffffff26;border-radius:12px;padding:12px 14px;background:#f59e0b;color:#111;font-weight:800;cursor:pointer}
</style>
</head>
<body>
<div class="card" id="loading"><h1 class="title">mechanical war.io</h1><p class="small">Loading stable game build...</p><p class="small">The black-screen map patch was removed. Refresh if the old cached page appears.</p></div>
<script>
(async()=>{
  const raw='https://raw.githubusercontent.com/HoussemMouradi/mechanicalwar.io/707e0a6fb3fae73380d3efdbfcc49fe52d07cee9/index.html';
  let t=await fetch(raw,{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error('Could not load stable build: '+r.status);return r.text()});
  t=t.replace("ROOM='mechanical-war-office-guns-v5'","ROOM='mechanical-war-stable-no-black-v1'");
  t=t.replace('Office FPS with reliable gun pickup and live player list','Stable office FPS build - black screen fixed');
  t=t.replace('Office FPS · reliable E pickup · live room list','Stable office FPS · black screen fixed');
  document.open();document.write(t);document.close();
})().catch(e=>{document.getElementById('loading').innerHTML='<h1 class="title">mechanical war.io</h1><p class="err">Failed to load stable build. Hard refresh the page.\n'+String(e.message||e)+'</p><button onclick="location.reload()">Reload</button>'});
</script>
</body>
</html>
