<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>mechanical war.io</title>
<meta name="description" content="Office FPS with live lobby counter and larger lower-right weapon view">
<style>
html,body{margin:0;height:100%;background:#07101d;color:#eaf2ff;font-family:system-ui,Segoe UI,Arial;display:grid;place-items:center}.card{max-width:760px;margin:20px;padding:22px;border:1px solid #ffffff26;border-radius:22px;background:#0f172af5;box-shadow:0 25px 80px #000a}.title{font-size:clamp(32px,8vw,56px);margin:0 0 8px;font-weight:950;text-transform:uppercase;background:linear-gradient(90deg,#fff,#fbbf24,#38bdf8);-webkit-background-clip:text;color:transparent}.small{color:#94a3b8}.err{color:#fca5a5;white-space:pre-wrap}</style>
</head>
<body>
<div class="card" id="loading"><h1 class="title">mechanical war.io</h1><p class="small">Loading live lobby counter and reference weapon view...</p></div>
<script>
(async()=>{
  const raw='https://raw.githubusercontent.com/HoussemMouradi/mechanicalwar.io/707e0a6fb3fae73380d3efdbfcc49fe52d07cee9/index.html';
  let t=await fetch(raw,{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error('Could not load game build: '+r.status);return r.text()});
  t=t.replace("Office FPS with reliable gun pickup and live player list","Office FPS with live lobby counter and larger lower-right weapon view");
  t=t.replace("Office FPS · reliable E pickup · live room list","Office FPS · live lobby · larger weapon view");
  t=t.replace("ROOM='mechanical-war-office-guns-v5'","ROOM='mechanical-war-office-guns-v9'");
  t=t.replace("function enter(){if(!ready()||joining)return;clean();joining=true;", "function enter(){if(!ready()||joining)return;stopLobby();clean();joining=true;");
  t=t.replace("if(m.type==='join'){let p={...m.player", "if(m.type==='observe'){let oid='obs_'+Math.random().toString(36).slice(2,9);cons.set(oid,c);c.send({type:'welcome',players:[...players.values()],guns});return}if(m.type==='join'){let p={...m.player");
  const old="function drawHand(){if(!hand)return;while(hand.children.length)hand.remove(hand.children[0]);if(!me.gun)return;let m=gunMesh(me.gun);m.scale.set(.65,.65,.65);m.position.set(.28,-.22,-.62);m.rotation.set(.12,.2,0);hand.add(m)}";
  const fixed="function fpGunMesh(t){let d=GUN[t],g=new THREE.Group(),mm=mat(d.c,.32,.55);let body=new THREE.Mesh(new THREE.BoxGeometry(.28,.16,1.05),mm);body.position.set(0,0,-.55);g.add(body);let barrel=new THREE.Mesh(new THREE.CylinderGeometry(.04,.04,.9,14),mm);barrel.rotation.x=Math.PI/2;barrel.position.set(0,.03,-1.18);g.add(barrel);let sight=new THREE.Mesh(new THREE.BoxGeometry(.08,.16,.05),mm);sight.position.set(0,.16,-1.02);g.add(sight);let grip=new THREE.Mesh(new THREE.BoxGeometry(.18,.46,.18),mm);grip.position.set(-.03,-.32,-.18);grip.rotation.x=-.22;g.add(grip);let fore=new THREE.Mesh(new THREE.BoxGeometry(.22,.12,.36),mat(0x111827,.45,.4));fore.position.set(0,-.04,-.74);g.add(fore);if(t==='rifle'||t==='smg'){let stock=new THREE.Mesh(new THREE.BoxGeometry(.22,.14,.35),mm);stock.position.set(0,.02,.10);g.add(stock)}if(t==='shotgun'){let pump=new THREE.Mesh(new THREE.BoxGeometry(.28,.10,.45),mat(0x8b5a2b));pump.position.set(0,-.06,-.72);g.add(pump)}g.traverse(o=>{if(o.isMesh){o.castShadow=o.receiveShadow=true;o.frustumCulled=false;o.renderOrder=10}});return g}function drawHand(){if(!hand)return;while(hand.children.length)hand.remove(hand.children[0]);if(!me.gun)return;let m=fpGunMesh(me.gun);m.scale.set(.62,.62,.62);m.position.set(.48,-.34,-.70);m.rotation.set(-.06,-.16,-.10);hand.add(m)}";
  if(!t.includes(old)) throw new Error('Weapon transform patch target not found.');
  t=t.replace(old,fixed);
  const lobby="let lobbyPeer=null,lobbyConn=null,lobbyRetry=null;function stopLobby(){clearTimeout(lobbyRetry);lobbyRetry=null;try{lobbyConn&&lobbyConn.close()}catch(e){}try{lobbyPeer&&lobbyPeer.destroy()}catch(e){}lobbyConn=lobbyPeer=null}function startLobby(){if(state!=='menu'||joining||peer||lobbyPeer||!window.Peer)return;lobbyPeer=new Peer(undefined,{debug:0});lobbyPeer.on('open',()=>{lobbyConn=lobbyPeer.connect(ROOM,{reliable:true});lobbyConn.on('open',()=>lobbyConn.send({type:'observe'}));lobbyConn.on('data',m=>{if(m.type==='welcome'||m.type==='bulk'){players.clear();(m.players||[]).forEach(p=>players.set(p.id,{...p,last:Date.now()}));renderList();stat('Live room list updated. Choose team and enter.')}else if(m.type==='state'||m.type==='heartbeat'){if(m.player&&m.player.id!==myId)players.set(m.player.id,{...(players.get(m.player.id)||{}),...m.player,last:Date.now()});renderList()}else if(m.type==='leave'){players.delete(m.id);renderList()}});lobbyConn.on('close',()=>{stopLobby();if(state==='menu')lobbyRetry=setTimeout(startLobby,1800)})});lobbyPeer.on('error',()=>{stopLobby();if(state==='menu')lobbyRetry=setTimeout(startLobby,2200)})}setTimeout(startLobby,900);";
  t=t.replace("renderList();console.log('mechanical war.io reliable pickup v5 loaded');", lobby+"renderList();console.log('mechanical war.io lobby and weapon view v9 loaded');");
  document.open();document.write(t);document.close();
})().catch(e=>{document.getElementById('loading').innerHTML='<h1 class="title">mechanical war.io</h1><p class="err">Failed to load game build. Refresh the page.\n'+String(e.message||e)+'</p>'});
</script>
</body>
</html>
