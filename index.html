<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>mechanical war.io</title>
<meta name="description" content="Office FPS with corrected first-person weapon position">
<style>
html,body{margin:0;height:100%;background:#07101d;color:#eaf2ff;font-family:system-ui,Segoe UI,Arial;display:grid;place-items:center} .card{max-width:720px;margin:20px;padding:22px;border:1px solid #ffffff26;border-radius:22px;background:#0f172af5;box-shadow:0 25px 80px #000a}.title{font-size:clamp(32px,8vw,56px);margin:0 0 8px;font-weight:950;text-transform:uppercase;background:linear-gradient(90deg,#fff,#fbbf24,#38bdf8);-webkit-background-clip:text;color:transparent}.small{color:#94a3b8}.err{color:#fca5a5;white-space:pre-wrap}</style>
</head>
<body>
<div class="card" id="loading"><h1 class="title">mechanical war.io</h1><p class="small">Loading corrected first-person weapon view...</p></div>
<script>
(async()=>{
  const raw='https://raw.githubusercontent.com/HoussemMouradi/mechanicalwar.io/707e0a6fb3fae73380d3efdbfcc49fe52d07cee9/index.html';
  let t=await fetch(raw,{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error('Could not load game build: '+r.status);return r.text()});
  t=t.replace("Office FPS with reliable gun pickup and live player list","Office FPS with reliable gun pickup and corrected first-person weapon position");
  t=t.replace("Office FPS · reliable E pickup · live room list","Office FPS · reliable E pickup · corrected weapon view");
  t=t.replace("ROOM='mechanical-war-office-guns-v5'","ROOM='mechanical-war-office-guns-v6'");
  t=t.replace("m.scale.set(.65,.65,.65);m.position.set(.28,-.22,-.62);m.rotation.set(.12,.2,0);hand.add(m)","m.scale.set(.28,.28,.28);m.position.set(.38,-.36,-.86);m.rotation.set(-.04,Math.PI/2,-.08);m.traverse(o=>{if(o.isMesh){o.frustumCulled=false;o.renderOrder=10}});hand.add(m)");
  document.open();document.write(t);document.close();
})().catch(e=>{document.getElementById('loading').innerHTML='<h1 class="title">mechanical war.io</h1><p class="err">Failed to load game build. Refresh the page.\n'+String(e.message||e)+'</p>'});
</script>
</body>
</html>
